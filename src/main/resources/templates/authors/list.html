<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
    <head>
        <meta charset="UTF-8">
        <title>Authors list</title>
    </head>
    <body>

        <table>
            <tr>
                <th>ID</th>
                <th>Firstname</th>
                <th>Lastname</th>
            </tr>
            <tr th:each="author : ${authors}">
                <td th:text="${author.getId()}"></td>
                <td th:text="${author.getFirstName()}"></td>
                <td th:text="${author.getLastName()}"></td>
            </tr>

        </table>

    </body>
</html>
